name: Refresh predictions

on:
  schedule:
    - cron: "7 */3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Refresh predictions data
        run: pnpm --filter @veyrapro/static-data refresh
        env:
          SPORTS_API_BASE_URL: ${{ secrets.SPORTS_API_BASE_URL }}
          SPORTS_API_KEY: ${{ secrets.SPORTS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push updated data
        run: |
          git config user.name "veyrapro-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: refresh predictions data [skip ci]"
            git push
          fi
