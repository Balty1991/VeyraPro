version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: veyrapro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: veyrapro
      POSTGRES_PASSWORD: veyrapro
      POSTGRES_DB: veyrapro
    ports:
      - "5432:5432"
    volumes:
      - veyrapro_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veyrapro"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: veyrapro-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  veyrapro_postgres_data:
